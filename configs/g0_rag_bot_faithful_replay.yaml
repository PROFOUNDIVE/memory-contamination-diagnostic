run:
  name: g0_rag_bot_faithful_replay
  description: "Faithful RAG/BoT replay skeleton for the locked 3-task pilot set"
  mode: faithful
  stage: replay
  provider: replay
  model_snapshots:
    gpt4o: g0_rag_bot_faithful_v1
    frontier_reasoning: g0_rag_bot_faithful_v1
  task_order_seed: 1
  sample_order_seed: 1
  retry_policy_version: retry_v0

models:
  - gpt4o
  - frontier_reasoning

tasks:
  - name: game24
    sample_path: data/tasks/game24_pilot.jsonl
    limit: 3
  - name: math_equation_balancer
    sample_path: data/tasks/math_equation_balancer_pilot.jsonl
    limit: 3
  - name: word_sorting
    sample_path: data/tasks/word_sorting_pilot.jsonl
    limit: 3

baselines:
  - retrieval_rag
  - bot_style

arms:
  - clean
  - contaminated
  - contaminated_filter

logging:
  output_dir: runs
  schema_version: logging_v1
  prompt_version: prompt_v0
  memory_policy_version: memory_policy_v0
  contamination_catalog_version: contamination_v0

