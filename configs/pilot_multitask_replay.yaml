run:
  name: pilot_multitask_replay
  description: "Small clean replay matrix over the locked 3-task pilot set"
  stage: replay
  provider: replay
  model_snapshots:
    gpt4o: pilot_multitask_replay_fixture_v1
    frontier_reasoning: pilot_multitask_replay_fixture_v1
  task_order_seed: 1
  sample_order_seed: 1
  retry_policy_version: retry_v0

models:
  - gpt4o
  - frontier_reasoning

tasks:
  - name: game24
    sample_path: data/tasks/game24_pilot.jsonl
    limit: 3
  - name: math_equation_balancer
    sample_path: data/tasks/math_equation_balancer_pilot.jsonl
    limit: 3
  - name: word_sorting
    sample_path: data/tasks/word_sorting_pilot.jsonl
    limit: 3

baselines:
  - no_memory
  - full_history
  - retrieval_rag
  - reflexion_style
  - bot_style

arms:
  - clean

logging:
  output_dir: runs
  schema_version: logging_v1
  prompt_version: prompt_v0
  memory_policy_version: memory_policy_v0
  contamination_catalog_version: contamination_v0

replay:
  fixture_version: pilot_multitask_replay_fixture_v1
  responses_by_sample:
    game24_pilot_001: "final: 6 / (1 - (3 / 4))"
    game24_pilot_002: "final: (3 + 7) + (2 * 7)"
    game24_pilot_003: "final: 8 / (3 - (8 / 3))"
    meb_pilot_001: "final: 2 + 5 = 7"
    meb_pilot_002: "final: 9 - 4 = 5"
    meb_pilot_003: "final: 3 * 6 = 18"
    word_sorting_pilot_001: "final: apple banana pear"
    word_sorting_pilot_002: "final: alpha bravo charlie delta"
    word_sorting_pilot_003: "final: ant yak zebra"

live_smoke:
  enabled: false
