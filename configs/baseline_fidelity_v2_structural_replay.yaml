run:
  name: baseline_fidelity_v2_structural_replay
  description: "F1A structural integration replay for the Baseline-Fidelity-V2 boundary"
  mode: faithful
  stage: replay
  contract_level: phase11
  provider: replay
  model_snapshots:
    replay_bfv2_structural: baseline_fidelity_v2_structural_fixture
  task_order_seed: 1
  sample_order_seed: 1
  retry_policy_version: baseline_fidelity_v2
  baseline_execution_contract_version: baseline_fidelity_v2
  failure_taxonomy_version: baseline_fidelity_v2
  fidelity_gate_layer: structural

models:
  - replay_bfv2_structural

tasks:
  - name: game24
    sample_path: data/tasks/game24_pilot.jsonl
    limit: 1

baselines:
  - no_memory
  - full_history
  - retrieval_rag
  - reflexion_style
  - bot_style

arms:
  - clean

logging:
  output_dir: runs
  schema_version: logging_v2
  prompt_version: baseline_fidelity_v2
  memory_policy_version: baseline_fidelity_v2
  contamination_catalog_version: contamination_v0

evaluation:
  evaluation_law_id: baseline_fidelity_v2_structural_online_replay
  regime: online
  task_law_id: locked_game24_limit1_v1
  inference_law_id: baseline_fidelity_v2_structural_fixture
  checkpoint_policy_id: null

target_contamination_set:
  target_set_id: controlled_injected_derived_v1
  definition_version: phase11_v1
  included_classes:
    - injected
    - derived
  require_exact_lineage: true

memory:
  corpus_path: data/memory/catalog_v3.jsonl
  corpus_version: memory_catalog_v3
  corpus_manifest_path: data/memory/catalog_v3.manifest.json

embedding:
  mode: test_double
  model_id: sentence-transformers/all-MiniLM-L6-v2
  revision: 1110a243fdf4706b3f48f1d95db1a4f5529b4d41
  cache_path: data/embedding_cache
  offline_fallback: true
  top_k: 3
  normalize: true
  corpus_path: data/memory/catalog_v3.jsonl
  corpus_version: memory_catalog_v3

replay:
  fixture_version: baseline_fidelity_v2_structural_fixture
  responses_by_sample:
    game24_pilot_001:
      no_memory_generate: "final: 6 / (1 - (3 / 4))"
      rag_generate: "final: 6 / (1 - (3 / 4))"
      full_history_generate: "final: 6 / (1 - (3 / 4))"
      reflexion_generate: "final: 6 / (1 - (3 / 4))"
      bot_problem_distill: "structural replay distillation"
      bot_instantiate_solve: "final: 6 / (1 - (3 / 4))"
      bot_thought_distill: "structural replay template"

live_smoke:
  enabled: false
