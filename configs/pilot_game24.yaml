run:
  name: pilot_game24
  description: "Small logging QA pilot before full matrix"
  stage: replay
  provider: replay
  model_snapshots:
    gpt4o: pilot_game24_fixture_v1
    frontier_reasoning: pilot_game24_fixture_v1
  task_order_seed: 1
  sample_order_seed: 1
  retry_policy_version: retry_v0

models:
  - gpt4o
  - frontier_reasoning

tasks:
  - name: game24
    sample_path: data/tasks/game24_pilot.jsonl
    limit: 5

baselines:
  - no_memory
  - full_history
  - retrieval_rag
  - reflexion_style
  - bot_style

arms:
  - clean
  - contaminated
  - contaminated_filter

logging:
  output_dir: runs
  schema_version: logging_v1
  prompt_version: prompt_v0
  memory_policy_version: memory_policy_v0
  contamination_catalog_version: contamination_v0

replay:
  fixture_version: pilot_game24_fixture_v1
  responses_by_sample:
    game24_pilot_001: "final: 6 / (1 - (3 / 4))"
    game24_pilot_002: "final: (3 + 7) + (2 * 7)"
    game24_pilot_003: "final: 8 / (3 - (8 / 3))"
    game24_pilot_004: "final: (5 - (1 / 5)) * 5"
    game24_pilot_005: "final: 4 * ((4 - 6) + 8)"
