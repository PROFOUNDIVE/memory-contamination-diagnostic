run:
  name: logging_contract_replay
  description: "Offline logging-contract replay fixture for the locked 3-task pilot set"
  mode: faithful
  stage: replay
  provider: replay
  model_snapshots:
    replay_logging_contract: logging_contract_fixture_v1
  task_order_seed: 1
  sample_order_seed: 1
  retry_policy_version: retry_v0

models:
  - replay_logging_contract

tasks:
  - name: game24
    sample_path: data/tasks/game24_pilot.jsonl
    limit: 1
  - name: math_equation_balancer
    sample_path: data/tasks/math_equation_balancer_pilot.jsonl
    limit: 1
  - name: word_sorting
    sample_path: data/tasks/word_sorting_pilot.jsonl
    limit: 1

baselines:
  - no_memory
  - full_history
  - retrieval_rag
  - reflexion_style
  - bot_style

arms:
  - clean
  - contaminated
  - contaminated_filter

logging:
  output_dir: runs
  schema_version: logging_v1
  prompt_version: prompt_v0
  memory_policy_version: memory_policy_v0
  contamination_catalog_version: contamination_v0

memory:
  corpus_path: data/memory/catalog_v2.jsonl
  corpus_version: memory_catalog_v2

embedding:
  model_id: sentence-transformers/all-MiniLM-L6-v2
  revision: 1110a243fdf4706b3f48f1d95db1a4f5529b4d41
  cache_path: data/embedding_cache
  offline_fallback: true
  top_k: 3
  normalize: true
  corpus_path: data/memory/catalog_v2.jsonl
  corpus_version: memory_catalog_v2

replay:
  fixture_version: logging_contract_fixture_v1
  responses_by_sample:
    game24_pilot_001:
      no_memory_generate: "final: 6 / (1 - (3 / 4))"
      rag_generate: "final: 6 / (1 - (3 / 4))"
      full_history_generate: "final: 6 / (1 - (3 / 4))"
      reflexion_generate:
        - "final: 1 + 1 + 1 + 1"
        - "final: 6 / (1 - (3 / 4))"
      reflexion_reflect: "I should have tried forming a fraction like 1 - 3/4 to create a useful denominator."
      bot_problem_distill: |
        Distilled Information:

        1. Key information: numbers = [1, 3, 4, 6], target = 24
        2. Restriction: use every number exactly once and respect arithmetic precedence.
        3. Distilled task: build an expression that reaches the target.
        4. Python transformation: numbers = [1, 3, 4, 6]; target = 24; expression = solve_game24(numbers, target)
        5. Answer form: return a single arithmetic expression.
      bot_instantiate_solve: "final: 6 / (1 - (3 / 4))"
      bot_thought_distill: |
        ### Problem Type: game24

        Definition: Arithmetic target construction from a fixed multiset of numbers.

        Quantitative Relationships: Track the target value, required numbers, and inverse operations that create useful intermediate values.

        Solution Strategy: Build a compact expression by creating a denominator or subexpression that transforms one given number into the target.

        Example: For similar inputs, inspect fractions, complements, and parenthesized subexpressions before combining all numbers exactly once.
      bot_novelty_decide: "True"
    meb_pilot_001:
      no_memory_generate: "final: 2 + 5 = 7"
      rag_generate: "final: 2 + 5 = 7"
      full_history_generate: "final: 2 + 5 = 7"
      reflexion_generate: "final: 2 + 5 = 7"
      reflexion_reflect: "The left side evaluates directly to the missing right-hand value."
      bot_problem_distill: |
        Distilled Information:

        1. Key information: expression = '2 + 5 = ?'
        2. Restriction: evaluate the arithmetic expression using standard precedence.
        3. Distilled task: compute the missing value.
        4. Python transformation: expression = '2 + 5 = ?'; result = evaluate_expression(expression)
        5. Answer form: return the completed equation.
      bot_instantiate_solve: "final: 2 + 5 = 7"
      bot_thought_distill: |
        ### Problem Type: math_equation_balancer

        Definition: Direct arithmetic evaluation under standard operator precedence.

        Quantitative Relationships: Preserve the expression structure, reduce inner operations first, then combine terms in order.

        Solution Strategy: Translate the expression into a deterministic calculation and return only the final value.

        Example: For similar inputs, identify precedence boundaries before simplifying the whole expression.
      bot_novelty_decide: "True"
    word_sorting_pilot_001:
      no_memory_generate: "final: apple banana pear"
      rag_generate: "final: apple banana pear"
      full_history_generate: "final: apple banana pear"
      reflexion_generate: "final: apple banana pear"
      reflexion_reflect: "Lexicographic comparison from the first letter produced the correct order."
      bot_problem_distill: |
        Distilled Information:

        1. Key information: words = ['pear', 'apple', 'banana']
        2. Restriction: sort the words lexicographically and preserve each input once.
        3. Distilled task: return the words in alphabetical order.
        4. Python transformation: words = ['pear', 'apple', 'banana']; sorted_words = sorted(words)
        5. Answer form: return the sorted words separated by spaces.
      bot_instantiate_solve: "final: apple banana pear"
      bot_thought_distill: |
        ### Problem Type: word_sorting

        Definition: Lexicographic ordering of a fixed word list.

        Quantitative Relationships: Each input word appears exactly once in the output; ordering is alphabetical.

        Solution Strategy: Normalize the list as tokens, sort lexicographically, and emit the sorted sequence without adding commentary.

        Example: For similar inputs, compare words from left to right and keep duplicates only if present in the source list.
      bot_novelty_decide: "True"

live_smoke:
  enabled: false
