responses_by_sample:
  game24_pilot_001:
    dc_rs_synthesize: "<cheatsheet>Look for a fraction denominator that converts one number into a useful multiplier.</cheatsheet>"
    dc_rs_generate: "final: 6 / (1 - (3 / 4))"
    reflexion_generate:
      - "final: 1 + 1 + 1 + 1"
      - "final: 6 / (1 - (3 / 4))"
    reflexion_reflect: "I should have tried forming a fraction like 1 - 3/4 to create a useful denominator."
  game24_pilot_002:
    dc_rs_synthesize: "<cheatsheet>When the numbers sum to the target, prefer direct addition.</cheatsheet>"
    dc_rs_generate: "final: 7 + 7 + 3 + 2"
    reflexion_generate: "final: 7 * 2 + 7 + 3"
  game24_pilot_003:
    dc_rs_synthesize: "<cheatsheet>Use repeated fractions with a common denominator to keep every number in play.</cheatsheet>"
    dc_rs_generate: "final: (8 / 3) + (8 / 3) + 3"
    reflexion_generate: "final: 8 / (3 - 8 / 3)"
  meb_pilot_001:
    dc_rs_synthesize: "<cheatsheet>Evaluate addition left-to-right after parentheses and multiplication/division.</cheatsheet>"
    dc_rs_generate: "final: 2 + 5 = 7"
    reflexion_generate: "final: 2 + 5 = 7"
  meb_pilot_002:
    dc_rs_synthesize: "<cheatsheet>For simple subtraction equations, compute the left side and match it.</cheatsheet>"
    dc_rs_generate: "final: 9 - 4 = 5"
    reflexion_generate: "final: 9 - 4 = 5"
  meb_pilot_003:
    dc_rs_synthesize: "<cheatsheet>Apply multiplication before addition/subtraction when balancing equations.</cheatsheet>"
    dc_rs_generate: "final: 3 * 6 = 18"
    reflexion_generate: "final: 3 * 6 = 18"
  word_sorting_pilot_001:
    dc_rs_synthesize: "<cheatsheet>Sort words alphabetically using Python's default string comparison.</cheatsheet>"
    dc_rs_generate: "final: apple banana pear"
    reflexion_generate: "final: apple banana pear"
  word_sorting_pilot_002:
    dc_rs_synthesize: "<cheatsheet>Preserve every input word exactly once and output a space-separated sorted list.</cheatsheet>"
    dc_rs_generate: "final: alpha bravo charlie delta"
    reflexion_generate: "final: alpha bravo charlie delta"
  word_sorting_pilot_003:
    dc_rs_synthesize: "<cheatsheet>Do not sort by length; use lexicographic order for every WordSorting case.</cheatsheet>"
    dc_rs_generate: "final: ant yak zebra"
    reflexion_generate: "final: ant yak zebra"
